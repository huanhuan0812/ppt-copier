name: Build EXE with PyInstaller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon "icon.ico" --name "ppt-copier" --optimize "2" --hidden-import "pywin32" --hidden-import "psutil" --hidden-import "core" --hidden-import "ui" --hidden-import "events" --hidden-import "utils" --collect-submodules "core" --collect-submodules "ui" --collect-submodules "events" --collect-submodules "utils" --paths "./"  "main.py"
          cp icon.ico dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppt_monitor
          path: dist/